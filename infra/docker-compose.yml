services:
  # ============================================
  # EVOLUTION API
  # ============================================
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      - evolution_postgres
      - evolution_redis
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution_net
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================
  # EVOLUTION MANAGER (Frontend oficial)
  # ============================================
  evolution-manager:
    container_name: evolution_manager
    image: evoapicloud/evolution-manager:latest
    restart: unless-stopped
    depends_on:
      - evolution-api
    ports:
      - "3000:80"
    networks:
      - evolution_net
    env_file:
      - .env
    # PARCHE PARA EL BUG OFICIAL DE NGINX
    entrypoint: /bin/sh
    command: >
      -c "
      if [ -f /etc/nginx/conf.d/nginx.conf ]; then
        sed -i 's/ must-revalidate//g' /etc/nginx/conf.d/nginx.conf;
      fi && nginx -g 'daemon off;'
      "

  # ============================================
  # POSTGRESQL
  # ============================================
  evolution_postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS
  # ============================================
  evolution_redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - evolution_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================
# VOLUMES
# ============================================
volumes:
  evolution_instances:
    name: evolution_instances
  postgres_data:
    name: evolution_postgres_data
  redis_data:
    name: evolution_redis_data

# ============================================
# REDES
# ============================================
networks:
  evolution_net:
    name: evolution_net
    driver: bridge